<!DOCTYPE html>
<html lang="en">
<head>
<style>
  /* Owl Container */
  #owl {
    display: block;
    height: 210px;
    margin: 50px auto;
    position: relative;
    width: 210px;
    cursor: pointer;
  }
  
  #owl img {
    position: absolute;
  }

  /* Position the Body Parts */
  #owl #body { left: 70px; top: 58px; z-index: 1; }
  #owl #left-wing { left: 65px; top: 98px; z-index: 2; }
  #owl #right-wing { left: 128px; top: 98px; z-index: 2; }
  #owl #eyes { left: 81px; top: 74px; z-index: 3; }

  /* Animation for Wings */
  .wing {
    transition: all 0.4s ease-in-out;
  }

  /* Dancing Effect on Hover */
  #owl:hover #left-wing {
    transform: rotate(30deg);
  }
  
  #owl:hover #right-wing {
    transform: rotate(-30deg);
  }

  #owl:hover #body {
    animation: bounce 0.4s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body>

  <div id="owl">
    <!-- Replace src with your own image URLs -->
    <img id="body" src="owl-body.png" alt="Owl Body">
    <img id="left-wing" class="wing" src="left-wing.png" alt="Left Wing">
    <img id="right-wing" class="wing" src="right-wing.png" alt="Right Wing">
    <img id="eyes" src="eyes.png" alt="Eyes">
  </div>

</body>
</html>
