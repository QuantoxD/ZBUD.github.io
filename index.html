<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moja strona</title>

<style>
body {
  background: black;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  margin: 0;
}

h1 {
  margin-bottom: 20px;
  font-size: 28px;
  animation: rgb 2s linear infinite;
}

/* SOWA */
pre {
  font-size: 16px;
  line-height: 16px;
  text-align: center;
  animation: rgb 2s linear infinite;
  margin: 0;
}

/* RGB efekt */
@keyframes rgb {
  0% { color: red; }
  16% { color: orange; }
  33% { color: yellow; }
  50% { color: lime; }
  66% { color: cyan; }
  83% { color: blue; }
  100% { color: magenta; }
}
</style>
</head>

<body>

<h1>Witam na mojej stronie 👋</h1>

<pre id="owl"></pre>

<script>
const frames = [
`   ,_,  
  (o,o) 
  (   ) 
  "   " 
 /|   |\\
  |   |
 /     \\`,

`   ,_,  
  (o,o) 
  (   ) 
  "   " 
 \\|   |/
  |   |
 \\     /`
];

let i = 0;

function animate() {
  document.getElementById("owl").textContent = frames[i % frames.length];
  i++;
}

setInterval(animate, 300);
</script>

</body>
</html>
